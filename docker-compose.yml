# Локальный стенд для разработки: Postgres + ClickHouse.
# Запуск:   docker compose up -d
# Остановка: docker compose down

services:
  postgres:
    image: postgres:16
    container_name: tm-postgres
    environment:
      POSTGRES_DB: taskmanager
      POSTGRES_USER: taskmanager
      POSTGRES_PASSWORD: taskmanager
    ports:
      - "5433:5432"
    volumes:
      - pg-data:/var/lib/postgresql/data

  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: tm-clickhouse
    environment:
      CLICKHOUSE_DB: taskmanager
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: "taskmanager"
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - ch-data:/var/lib/clickhouse

  kafka:
    image: confluentinc/cp-kafka:7.7.1
    container_name: tm-kafka
    ports:
      - "9092:9092"
    environment:
      # Режим KRaft (без ZooKeeper) — Kafka сама себе координатор.
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@tm-kafka:29093"
      KAFKA_LISTENERS: "PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:29093,PLAINTEXT_HOST://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://tm-kafka:29092,PLAINTEXT_HOST://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

volumes:
  pg-data:
  ch-data: