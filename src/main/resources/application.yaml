spring:
  application:
    name: taskmanager

  # --- JSON: как таск-менеджер и парсер сопоставляют имена полей ---
  # Парсер (Python) отдаёт snake_case (card_price, reviews_count).
  # Java-поля — camelCase (cardPrice). Эта стратегия переводит одно в другое
  # автоматически в обе стороны (и при чтении ответов, и при отправке запросов).
  jackson:
    property-naming-strategy: SNAKE_CASE

  # --- Postgres: актуальное состояние сета ---
  # Порт 5433 — наш контейнерный Postgres (5432 занят системным Postgres).
  datasource:
    url: jdbc:postgresql://localhost:5433/taskmanager
    username: taskmanager
    password: taskmanager
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Схемой управляет Flyway, а не Hibernate. validate = Hibernate только
      # сверяет соответствие сущностей реальной схеме, но сам её не меняет.
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false

  # --- Flyway: миграции схемы Postgres ---
  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      # Ключ и значение сообщения — строки (мы сами сериализуем в JSON).
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
    consumer:
      group-id: taskmanager
      # Начинать чтение с самых ранних непрочитанных сообщений.
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer

# --- ClickHouse: отдельная база замеров. Настраивается вручную в коде,
#     здесь только параметры подключения. Порт 8123 — HTTP-интерфейс. ---
clickhouse:
  url: jdbc:clickhouse://localhost:8123/taskmanager
  username: default
  password: "taskmanager"

# --- Парсер Ozon (внешний сервис на FastAPI) ---
parser:
  ozon:
    base-url: ${PARSER_OZON_URL:http://localhost:8010}

server:
  port: 8080